# ════════════════════════════════════════════
# Vijay ERP — Netlify Configuration
# File: netlify.toml
# ════════════════════════════════════════════

[build]
  # No build command needed (static HTML)
  publish = "."
  command = ""

# ── PRODUCTION CONTEXT ──────────────────────
[context.production]
  environment = { ENVIRONMENT = "production", APP_VERSION = "2.0" }

# ── DEV/PREVIEW CONTEXT ─────────────────────
[context.deploy-preview]
  environment = { ENVIRONMENT = "preview" }

[context.branch-deploy]
  environment = { ENVIRONMENT = "staging" }

# ── HEADERS — Security hardening ────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── REDIRECTS ────────────────────────────────
[[redirects]]
  from = "/dashboard"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/importer"
  to = "/importer.html"
  status = 200

[[redirects]]
  from = "/status"
  to = "/deploy-status.html"
  status = 200

# ── FUNCTIONS (if needed later) ──────────────
[functions]
  directory = "netlify/functions"

# ── PLUGINS ─────────────────────────────────
# Uncomment to enable Lighthouse CI
# [[plugins]]
#   package = "@netlify/plugin-lighthouse"
