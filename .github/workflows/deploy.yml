# ════════════════════════════════════════════
# Vijay ERP — GitHub Actions CI/CD Pipeline
# File: .github/workflows/deploy.yml
# ════════════════════════════════════════════
# FLOW:
#   dev branch   → push → QA tests → Netlify Preview URL
#   main branch  → push → QA tests → PASS → Production Deploy
#                                  → FAIL → Auto Rollback + Alert

name: Vijay ERP — CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  APP_NAME: vijay-erp
  PRODUCTION_BRANCH: main
  DEV_BRANCH: dev

jobs:

  # ── JOB 1: AUTOMATED QA TESTS ──────────────────
  qa-tests:
    name: "🧪 QA Tests (55 tests)"
    runs-on: ubuntu-latest
    outputs:
      qa_passed: ${{ steps.qa.outputs.passed }}
      qa_score: ${{ steps.qa.outputs.score }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run QA Test Suite
        id: qa
        run: |
          cd tests
          python3 qa_tests.py 2>&1 | tee qa_output.txt
          
          # Extract score
          SCORE=$(grep "Score:" qa_output.txt | grep -o '[0-9]*%' | head -1)
          PASSED=$(grep "PASSED:" qa_output.txt | grep -o '[0-9]*' | head -1)
          
          echo "passed=${PASSED}" >> $GITHUB_OUTPUT
          echo "score=${SCORE}" >> $GITHUB_OUTPUT
          
          # Fail if not 100%
          if grep -q "DO NOT DEPLOY" qa_output.txt; then
            echo "❌ QA FAILED — Blocking deployment"
            exit 1
          fi
          echo "✅ QA PASSED — ${SCORE}"

      - name: Upload QA Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-${{ github.sha }}
          path: tests/qa_output.txt
          retention-days: 30

  # ── JOB 2: AUTO BACKUP BEFORE DEPLOY ───────────
  backup:
    name: "💾 Pre-Deploy Backup"
    runs-on: ubuntu-latest
    needs: qa-tests
    if: needs.qa-tests.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Create backup snapshot
        id: backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 scripts/backup.py
          echo "backup_created=true" >> $GITHUB_OUTPUT
          echo "backup_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.sha }}-${{ github.run_number }}
          path: backups/
          retention-days: 90

  # ── JOB 3: DEPLOY TO PREVIEW (dev branch) ──────
  deploy-preview:
    name: "🔍 Deploy Preview (dev)"
    runs-on: ubuntu-latest
    needs: [qa-tests, backup]
    if: github.ref == 'refs/heads/dev' && needs.qa-tests.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify Preview
        id: netlify-preview
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          DEPLOY_URL=$(netlify deploy --dir . --message "Preview: ${{ github.sha }}" --json 2>&1 | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('deploy_url',''))")
          echo "preview_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
          echo "✅ Preview deployed: ${DEPLOY_URL}"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Preview Deployment Ready\n\n**URL:** ${{ steps.netlify-preview.outputs.preview_url }}\n\n**QA Score:** ${{ needs.qa-tests.outputs.qa_score }}\n**Commit:** \`${{ github.sha }}\``
            })

  # ── JOB 4: DEPLOY TO PRODUCTION (main branch) ──
  deploy-production:
    name: "🚀 Deploy Production"
    runs-on: ubuntu-latest
    needs: [qa-tests, backup]
    if: github.ref == 'refs/heads/main' && needs.qa-tests.result == 'success'
    environment:
      name: production
      url: https://venerable-speculoos-8f80cb.netlify.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify Production
        id: netlify-prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy --prod --dir . --message "Production: ${{ github.sha }}"
          echo "deploy_id=$(netlify api listSiteDeploys --data '{}' | python3 -c \"import sys,json; d=json.load(sys.stdin); print(d[0]['id'])\" 2>/dev/null || echo 'unknown')" >> $GITHUB_OUTPUT

      - name: Post-deploy health check
        run: |
          sleep 15
          python3 scripts/health_check.py https://venerable-speculoos-8f80cb.netlify.app

      - name: Write deploy log
        run: |
          python3 scripts/log_deploy.py \
            --sha "${{ github.sha }}" \
            --status "success" \
            --qa-score "${{ needs.qa-tests.outputs.qa_score }}" \
            --deployer "${{ github.actor }}"

  # ── JOB 5: AUTO ROLLBACK ON FAILURE ────────────
  rollback:
    name: "⏪ Auto Rollback"
    runs-on: ubuntu-latest
    needs: [qa-tests, deploy-production]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.qa-tests.result == 'failure' || needs.deploy-production.result == 'failure')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Get last stable deploy
        id: last-stable
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Get last successful deploy ID
          LAST_DEPLOY=$(netlify api listSiteDeploys \
            --data '{"state":"ready"}' 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d[1]['id'] if len(d)>1 else '')" 2>/dev/null || echo '')
          echo "deploy_id=${LAST_DEPLOY}" >> $GITHUB_OUTPUT

      - name: Rollback to last stable
        if: steps.last-stable.outputs.deploy_id != ''
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify api restoreSiteDeploy \
            --data '{"deploy_id":"${{ steps.last-stable.outputs.deploy_id }}"}'
          echo "⏪ Rolled back to deploy: ${{ steps.last-stable.outputs.deploy_id }}"

      - name: Send rollback alert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚨 ROLLBACK TRIGGERED" >> $GITHUB_STEP_SUMMARY
          echo "Reason: QA or deploy failed" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
